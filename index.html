<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rocket League 1:1 - Browser Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }
        
        #gameContainer {
            text-align: center;
        }
        
        #gameCanvas {
            border: 4px solid #00d4ff;
            border-radius: 10px;
            background: #2d2d4a;
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.3);
        }
        
        #ui {
            margin-top: 20px;
            color: white;
            font-size: 18px;
        }
        
        .score {
            display: inline-block;
            margin: 0 40px;
            font-size: 32px;
            font-weight: bold;
        }
        
        #player1Score {
            color: #00d4ff;
        }
        
        #player2Score {
            color: #ff6b6b;
        }
        
        #instructions {
            margin-top: 15px;
            color: #aaa;
            font-size: 14px;
        }
        
        #boostIndicator {
            margin-top: 10px;
            font-size: 16px;
            color: #00ff88;
        }
        
        h1 {
            color: #00d4ff;
            margin-bottom: 15px;
            font-size: 28px;
            text-shadow: 0 0 10px rgba(0, 212, 255, 0.5);
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <h1>🚀 Rocket League 1:1</h1>
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        <div id="ui">
            <span id="player1Score" class="score">0</span>
            <span id="player2Score" class="score">0</span>
        </div>
        <div id="boostIndicator">Boost P1: 100% | Boost P2: 100%</div>
        <div id="instructions">
            <p>Player 1 (Blue): Arrow Keys / WASD to drive, Space for boost</p>
            <p>Player 2 (Red): Arrow Keys / WASD to drive, Space for boost</p>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // Game constants
        const FRICTION = 0.98;
        const CAR_ACCELERATION = 0.3;
        const CAR_MAX_SPEED = 8;
        const CAR_TURN_SPEED = 0.08;
        const BALL_FRICTION = 0.99;
        const BALL_ELASTICITY = 0.8;
        const BOOST_RATE = 1;
        
        // Car class
        class Car {
            constructor(x, y, color, isPlayer1 = true) {
                this.x = x;
                this.y = y;
                this.color = color;
                this.angle = isPlayer1 ? 0 : Math.PI;
                this.speed = 0;
                this.width = 40;
                this.height = 20;
                this.boost = 100;
                this.isPlayer1 = isPlayer1;
            }
            
            update(keys) {
                let acceleration = CAR_ACCELERATION;
                
                // Boost
                if (keys.Space && this.boost > 0) {
                    acceleration = CAR_ACCELERATION * 2;
                    this.boost -= BOOST_RATE;
                }
                
                // Movement controls
                if (keys.Up || keys.W) {
                    this.speed += acceleration;
                } else if (keys.Down || keys.S) {
                    this.speed -= acceleration;
                }
                
                // Turning (only when moving)
                if (Math.abs(this.speed) > 0.1) {
                    const turnDirection = this.speed > 0 ? 1 : -1;
                    if (keys.Left || keys.A) {
                        this.angle -= CAR_TURN_SPEED * turnDirection;
                    }
                    if (keys.Right || keys.D) {
                        this.angle += CAR_TURN_SPEED * turnDirection;
                    }
                }
                
                // Apply friction
                this.speed *= FRICTION;
                
                // Limit speed
                const maxSpeed = CAR_MAX_SPEED * (this.boost > 50 ? 1.5 : 1);
                this.speed = Math.max(-maxSpeed, Math.min(maxSpeed, this.speed));
                
                // Update position
                this.x += Math.cos(this.angle) * this.speed;
                this.y += Math.sin(this.angle) * this.speed;
                
                // Boundary collision
                const halfWidth = this.width / 2;
                const halfHeight = this.height / 2;
                
                if (this.x < halfWidth) this.x = halfWidth;
                if (this.x > canvas.width - halfWidth) this.x = canvas.width - halfWidth;
                if (this.y < halfHeight) this.y = halfHeight;
                if (this.y > canvas.height - halfHeight) this.y = canvas.height - halfHeight;
                
                // Boost recharge
                if (this.boost < 100) {
                    this.boost += 0.5;
                }
            }
            
            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle);
                
                // Car body
                ctx.fillStyle = this.color;
                ctx.fillRect(-this.width/2, -this.height/2, this.width, this.height);
                
                // Car details
                ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
                ctx.fillRect(-this.width/2 + 5, -this.height/2 + 3, this.width - 10, this.height - 6);
                
                // Wheels
                ctx.fillStyle = '#333';
                ctx.fillRect(-this.width/2 + 3, -this.height/2 - 3, 8, 6);
                ctx.fillRect(this.width/2 - 11, -this.height/2 - 3, 8, 6);
                ctx.fillRect(-this.width/2 + 3, this.height/2 - 3, 8, 6);
                ctx.fillRect(this.width/2 - 11, this.height/2 - 3, 8, 6);
                
                // Boost flame
                if (this.boost > 0 && keys.Space) {
                    ctx.fillStyle = '#ff6600';
                    ctx.beginPath();
                    ctx.moveTo(-this.width/2 - 5, 0);
                    ctx.lineTo(-this.width/2 - 15 - Math.random() * 10, -5);
                    ctx.lineTo(-this.width/2 - 15 - Math.random() * 10, 5);
                    ctx.closePath();
                    ctx.fill();
                }
                
                ctx.restore();
            }
            
            getFront() {
                return {
                    x: this.x + Math.cos(this.angle) * this.width/2,
                    y: this.y + Math.sin(this.angle) * this.height/2
                };
            }
        }
        
        // Ball class
        class Ball {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.vx = 0;
                this.vy = 0;
                this.radius = 15;
            }
            
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vx *= BALL_FRICTION;
                this.vy *= BALL_FRICTION;
                
                if (this.x < this.radius) {
                    this.x = this.radius;
                    this.vx *= -BALL_ELASTICITY;
                }
                if (this.x > canvas.width - this.radius) {
                    this.x = canvas.width - this.radius;
                    this.vx *= -BALL_ELASTICITY;
                }
                if (this.y < this.radius) {
                    this.y = this.radius;
                    this.vy *= -BALL_ELASTICITY;
                }
                if (this.y > canvas.height - this.radius) {
                    this.y = canvas.height - this.radius;
                    this.vy *= -BALL_ELASTICITY;
                }
            }
            
            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.fillStyle = '#ffffff';
                ctx.beginPath();
                ctx.arc(0, 0, this.radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#333';
                ctx.beginPath();
                ctx.arc(0, 0, this.radius * 0.7, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#00d4ff';
                ctx.beginPath();
                ctx.arc(0, 0, this.radius * 0.4, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
            
            hit(car) {
                const front = car.getFront();
                const dx = this.x - front.x;
                const dy = this.y - front.y;
                const distance = Math.sqrt(dx * dx + dy * dy);
                
                if (distance < this.radius + car.width/2) {
                    const nx = dx / distance;
                    const ny = dy / distance;
                    const impulse = car.speed * 1.5;
                    this.vx += nx * impulse;
                    this.vy += ny * impulse;
                    const overlap = this.radius + car.width/2 - distance;
                    this.x += nx * overlap;
                    this.y += ny * overlap;
                }
            }
        }
        
        // Goal class
        class Goal {
            constructor(x, y, width, height, isLeft = true) {
                this.x = x;
                this.y = y;
                this.width = width;
                this.height = height;
                this.isLeft = isLeft;
            }
            
            draw() {
                ctx.fillStyle = this.isLeft ? '#00d4ff' : '#ff6b6b';
                ctx.fillRect(this.x, this.y, this.width, this.height);
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
                ctx.lineWidth = 2;
                for (let i = 0; i < this.height; i += 10) {
                    ctx.beginPath();
                    ctx.moveTo(this.x, this.y + i);
                    ctx.lineTo(this.x + this.width, this.y + i + 5);
                    ctx.stroke();
                }
            }
            
            checkScore(ball) {
                return ball.y > this.y && ball.y < this.y + this.height &&
                       ball.x > this.x && ball.x < this.x + this.width;
            }
        }
        
        // Game state
        let player1 = new Car(100, 300, '#00d4ff', true);
        let player2 = new Car(700, 300, '#ff6b6b', false);
        let ball = new Ball(400, 300);
        let leftGoal = new Goal(0, 250, 50, 100, true);
        let rightGoal = new Goal(750, 250, 50, 100, false);
        let player1Score = 0;
        let player2Score = 0;
        let keys = {};
        
        document.addEventListener('keydown', (e) => {
            keys[e.key] = true;
            keys[e.code] = true;
        });
        
        document.addEventListener('keyup', (e) => {
            keys[e.key] = false;
            keys[e.code] = false;
        });
        
        function score(goal) {
            if (goal.isLeft) {
                player2Score++;
                document.getElementById('player2Score').textContent = player2Score;
            } else {
                player1Score++;
                document.getElementById('player1Score').textContent = player1Score;
            }
            resetPositions();
        }
        
        function resetPositions() {
            player1.x = 100; player1.y = 300; player1.angle = 0; player1.speed = 0;
            player2.x = 700; player2.y = 300; player2.angle = Math.PI; player2.speed = 0;
            ball.x = 400; ball.y = 300; ball.vx = 0; ball.vy = 0;
        }
        
        function drawArena() {
            ctx.fillStyle = '#2d2d4a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = '#444';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(canvas.width / 2, 0);
            ctx.lineTo(canvas.width / 2, canvas.height);
            ctx.stroke();
            ctx.beginPath();
            ctx.arc(canvas.width / 2, canvas.height / 2, 80, 0, Math.PI * 2);
            ctx.stroke();
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 250, 50, 100);
            ctx.fillRect(750, 250, 50, 100);
        }
        
        function gameLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawArena();
            player1.update(keys);
            player2.update(keys);
            ball.update();
            ball.hit(player1);
            ball.hit(player2);
            if (leftGoal.checkScore(ball)) score(leftGoal);
            if (rightGoal.checkScore(ball)) score(rightGoal);
            leftGoal.draw();
            rightGoal.draw();
            player1.draw();
            player2.draw();
            ball.draw();
            document.getElementById('boostIndicator').textContent = 
                `Boost P1: ${Math.floor(player1.boost)}% | Boost P2: ${Math.floor(player2.boost)}%`;
            requestAnimationFrame(gameLoop);
        }
        
        gameLoop();
    </script>
</body>
