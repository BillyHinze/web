<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Rocket League Lite</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #07111f;
      font-family: Arial, sans-serif;
    }
    canvas { display: block; }
    #ui {
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 10;
      color: white;
      user-select: none;
      text-shadow: 0 2px 6px rgba(0,0,0,0.65);
    }
    #score {
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 8px;
    }
    #countdown {
      font-size: 42px;
      font-weight: 900;
      color: #ffffff;
      margin: 8px 0;
      min-height: 52px;
    }
    #help {
      font-size: 13px;
      line-height: 1.5;
      opacity: 0.95;
      max-width: 420px;
    }
    #msg {
      margin-top: 8px;
      color: #9df;
      min-height: 18px;
    }
    #boostUI {
      margin-top: 8px;
      font-size: 14px;
      color: #8dffb3;
      line-height: 1.4;
    }
    .padLegend {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      margin-right: 6px;
      vertical-align: middle;
    }
  </style>

  <script async src="https://ga.jspm.io/npm:es-module-shims@1.7.3/dist/es-module-shims.js"></script>
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.164.1/build/three.module.js"
    }
  }
  </script>
</head>
<body>
  <div id="ui">
    <div id="score">You 0 - 0 AI</div>
    <div id="countdown">3</div>
    <div id="help">
      Move: W A S D or Arrow Keys<br>
      Boost: Shift or Space<br>
      Jump: E or Enter<br>
      Reset: R
    </div>
    <div id="boostUI"></div>
    <div id="msg"></div>
  </div>

  <script type="module">
    import * as THREE from 'three';

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x07111f);
    scene.fog = new THREE.Fog(0x07111f, 35, 130);

    const camera = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(innerWidth, innerHeight);
    renderer.setPixelRatio(devicePixelRatio);
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);

    const ambient = new THREE.AmbientLight(0xffffff, 1.15);
    scene.add(ambient);

    const sun = new THREE.DirectionalLight(0xffffff, 2.2);
    sun.position.set(20, 40, 10);
    sun.castShadow = true;
    scene.add(sun);

    const hemi = new THREE.HemisphereLight(0x88bbff, 0x223344, 1.2);
    scene.add(hemi);

    const fieldSize = 90;
    const fieldWidth = 60;
    const halfL = fieldSize / 2;
    const halfW = fieldWidth / 2;

    const ground = new THREE.Mesh(
      new THREE.PlaneGeometry(fieldSize, fieldWidth),
      new THREE.MeshStandardMaterial({ color: 0x143a2c, roughness: 1 })
    );
    ground.rotation.x = -Math.PI / 2;
    ground.receiveShadow = true;
    scene.add(ground);

    const lineMat = new THREE.MeshStandardMaterial({ color: 0x4a5e70, roughness: 1 });
    const centerLine = new THREE.Mesh(new THREE.BoxGeometry(fieldSize, 0.05, 0.12), lineMat);
    centerLine.position.y = 0.03;
    scene.add(centerLine);

    const centerCircle = new THREE.Mesh(
      new THREE.TorusGeometry(6, 0.1, 8, 48),
      lineMat
    );
    centerCircle.rotation.x = Math.PI / 2;
    centerCircle.position.y = 0.04;
    scene.add(centerCircle);

    const borderMat = new THREE.MeshStandardMaterial({ color: 0x223344, roughness: 0.8 });
    function wall(x, z, sx, sz) {
      const m = new THREE.Mesh(new THREE.BoxGeometry(sx, 2.5, sz), borderMat);
      m.position.set(x, 1.25, z);
      m.castShadow = true;
      m.receiveShadow = true;
      scene.add(m);
    }
    wall(0, -halfW - 1.2, 90, 2);
    wall(0,  halfW + 1.2, 90, 2);
    wall(-halfL - 1.2, 0, 2, 60);
    wall( halfL + 1.2, 0, 2, 60);

    function makeGoal(x, color) {
      const g = new THREE.Group();
      const mat = new THREE.MeshStandardMaterial({ color });
      const postGeo = new THREE.CylinderGeometry(0.25, 0.25, 4, 12);
      const barGeo = new THREE.BoxGeometry(8, 0.35, 0.35);
      const sideGeo = new THREE.BoxGeometry(0.35, 0.35, 4);

      const p1 = new THREE.Mesh(postGeo, mat); p1.position.set(-4, 2, 0);
      const p2 = new THREE.Mesh(postGeo, mat); p2.position.set(4, 2, 0);
      const top = new THREE.Mesh(barGeo, mat); top.position.set(0, 4, 0);
      const s1 = new THREE.Mesh(sideGeo, mat); s1.position.set(-4, 2, -2);
      const s2 = new THREE.Mesh(sideGeo, mat); s2.position.set(4, 2, -2);

      g.add(p1, p2, top, s1, s2);
      g.position.set(x, 0, 0);
      scene.add(g);
      return g;
    }
    makeGoal(-halfL - 0.7, 0x27b8ff);
    makeGoal( halfL + 0.7, 0xff5d6c);

    function createCar(color) {
      const g = new THREE.Group();

      const body = new THREE.Mesh(
        new THREE.BoxGeometry(2.2, 0.7, 3.6),
        new THREE.MeshStandardMaterial({ color, roughness: 0.6, metalness: 0.12 })
      );
      body.position.y = 0.55;
      body.castShadow = true;
      g.add(body);

      const cabin = new THREE.Mesh(
        new THREE.BoxGeometry(1.6, 0.6, 1.5),
        new THREE.MeshStandardMaterial({ color: 0xdddddd, roughness: 0.35, metalness: 0.05 })
      );
      cabin.position.set(0, 1.05, -0.2);
      cabin.castShadow = true;
      g.add(cabin);

      const wheelMat = new THREE.MeshStandardMaterial({ color: 0x111111 });
      const wheelGeo = new THREE.CylinderGeometry(0.34, 0.34, 0.28, 14);
      [[-1.05,0.3,1.4],[1.05,0.3,1.4],[-1.05,0.3,-1.4],[1.05,0.3,-1.4]].forEach(([x,y,z]) => {
        const w = new THREE.Mesh(wheelGeo, wheelMat);
        w.rotation.z = Math.PI / 2;
        w.position.set(x,y,z);
        w.castShadow = true;
        g.add(w);
      });

      g.userData = {
        vel: new THREE.Vector3(),
        vy: 0,
        boost: 100,
        onGround: true,
        jumpCD: 0,
        radius: 1.65
      };

      scene.add(g);
      return g;
    }

    const player = createCar(0x2aa8ff);
    const ai = createCar(0xff6677);
    player.position.set(-18, 0, 0);
    ai.position.set(18, 0, 0);
    player.rotation.y = Math.PI / 2;
    ai.rotation.y = -Math.PI / 2;

    const ball = new THREE.Mesh(
      new THREE.SphereGeometry(1.2, 24, 18),
      new THREE.MeshStandardMaterial({ color: 0xf2f2f2, roughness: 0.45, metalness: 0.05 })
    );
    ball.position.set(0, 1.2, 0);
    ball.castShadow = true;
    scene.add(ball);

    const ballVel = new THREE.Vector3();

    const padGeo = new THREE.CylinderGeometry(1.2, 1.2, 0.12, 24);
    const padMat = new THREE.MeshStandardMaterial({ color: 0x00ff88, emissive: 0x003322, emissiveIntensity: 1 });
    const pads = [
      [-30, -18], [-30, 18], [30, -18], [30, 18], [0, -22], [0, 22]
    ].map(([x, z]) => {
      const p = new THREE.Mesh(padGeo, padMat.clone());
      p.rotation.x = Math.PI / 2;
      p.position.set(x, 0.06, z);
      scene.add(p);
      return { mesh: p, x, z, active: true, timer: 0 };
    });

    const keys = {};
    addEventListener('keydown', e => {
      keys[e.key.toLowerCase()] = true;
      keys[e.code] = true;
      if (e.code === 'KeyR') resetGame();
    });
    addEventListener('keyup', e => {
      keys[e.key.toLowerCase()] = false;
      keys[e.code] = false;
    });

    const scoreEl = document.getElementById('score');
    const countdownEl = document.getElementById('countdown');
    const msgEl = document.getElementById('msg');
    const boostUI = document.getElementById('boostUI');

    let you = 0;
    let bot = 0;
    let state = 'countdown';
    let countdown = 3;
    let countdownTimer = 0;
    let kickoffLock = 0;
    let kickoffDelay = 0.35;
    let matchResetTimer = 0;

    function setScore() {
      scoreEl.textContent = `You ${you} - ${bot} AI`;
    }

    function resetPositions() {
      player.position.set(-18, 0, 0);
      ai.position.set(18, 0, 0);
      player.rotation.y = Math.PI / 2;
      ai.rotation.y = -Math.PI / 2;
      player.userData.vel.set(0,0,0);
      ai.userData.vel.set(0,0,0);
      player.userData.vy = 0;
      ai.userData.vy = 0;
      player.userData.boost = 100;
      ai.userData.boost = 100;
      ball.position.set(0, 1.2, 0);
      ballVel.set(0, 0, 0);
      kickoffLock = kickoffDelay;
    }

    function startCountdown(text = '3') {
      state = 'countdown';
      countdown = 3;
      countdownTimer = 0;
      countdownEl.textContent = text;
      msgEl.textContent = '';
      resetPositions();
    }

    function resetGame() {
      you = 0;
      bot = 0;
      setScore();
      matchResetTimer = 0;
      startCountdown('3');
    }

    function scoreGoal(playerScored) {
      if (playerScored) {
        you++;
        msgEl.textContent = 'You scored!';
      } else {
        bot++;
        msgEl.textContent = 'AI scored!';
      }
      setScore();
      state = 'paused';
      matchResetTimer = 1.0;
    }

    function moveCar(car, turn, throttle, boost, jump, dt) {
      const forward = new THREE.Vector3(Math.sin(car.rotation.y), 0, Math.cos(car.rotation.y));
      const right = new THREE.Vector3(forward.z, 0, -forward.x);

      car.rotation.y += turn * 2.3 * dt * (0.5 + Math.min(1, car.userData.vel.length() / 10));

      if (throttle !== 0) car.userData.vel.addScaledVector(forward, throttle * 18 * dt);

      if (boost && car.userData.boost > 0) {
        car.userData.vel.addScaledVector(forward, 28 * dt);
        car.userData.boost = Math.max(0, car.userData.boost - 20 * dt);
      } else {
        car.userData.boost = Math.min(100, car.userData.boost + 10 * dt);
      }

      const lateral = right.clone().multiplyScalar(car.userData.vel.dot(right));
      car.userData.vel.addScaledVector(lateral, -0.16);

      car.userData.vel.multiplyScalar(0.985);
      const maxSpeed = boost ? 30 : 18;
      if (car.userData.vel.length() > maxSpeed) car.userData.vel.setLength(maxSpeed);

      car.position.addScaledVector(car.userData.vel, dt);
      car.position.x = THREE.MathUtils.clamp(car.position.x, -halfL + 2, halfL - 2);
      car.position.z = THREE.MathUtils.clamp(car.position.z, -halfW + 2, halfW - 2);

      car.userData.vy -= 18 * dt;
      if (jump && car.userData.onGround && car.userData.jumpCD <= 0) {
        car.userData.vy = 8.5;
        car.userData.onGround = false;
        car.userData.jumpCD = 0.35;
      }
      if (car.userData.jumpCD > 0) car.userData.jumpCD -= dt;

      car.position.y += car.userData.vy * dt;
      if (car.position.y <= 0) {
        car.position.y = 0;
        car.userData.vy = 0;
        car.userData.onGround = true;
      }
    }

    function playerInput(dt) {
      const left = keys.a || keys.arrowleft;
      const right = keys.d || keys.arrowright;
      const up = keys.w || keys.arrowup;
      const down = keys.s || keys.arrowdown;
      const boost = keys.shift || keys.shiftleft || keys.space;
      const jump = keys.e || keys.enter;
      moveCar(player, (left ? 1 : 0) + (right ? -1 : 0), (up ? 1 : 0) + (down ? -1 : 0), boost, jump, dt);
    }

    function aiInput(dt) {
      const toBall = ball.position.clone().sub(ai.position);
      const desired = Math.atan2(toBall.x, toBall.z);
      let delta = desired - ai.rotation.y;
      delta = Math.atan2(Math.sin(delta), Math.cos(delta));

      const turn = THREE.MathUtils.clamp(delta * 1.8, -1, 1);
      const throttle = toBall.length() > 3 ? 1 : -0.2;
      const boost = toBall.length() > 18 && Math.abs(delta) < 0.5 && ai.userData.boost > 10;
      const jump = ball.position.y > 2.2 && toBall.length() < 6;

      moveCar(ai, turn, throttle, boost, jump, dt);
    }

    function carBall(car) {
      const dx = ball.position.x - car.position.x;
      const dz = ball.position.z - car.position.z;
      const dist = Math.hypot(dx, dz);
      const min = car.userData.radius + 1.2;
      if (dist < min) {
        const nx = dx / (dist || 1);
        const nz = dz / (dist || 1);
        const push = (min - dist) * 0.9;
        ball.position.x += nx * push;
        ball.position.z += nz * push;
        ballVel.addScaledVector(new THREE.Vector3(nx, 0, nz), Math.max(2, car.userData.vel.length() * 0.7));
      }
    }

    function updateBoostPads(dt) {
      pads.forEach(p => {
        p.mesh.material.emissiveIntensity = p.active ? 1.0 : 0.15;
        p.mesh.rotation.z += dt * 0.6;
        if (!p.active) {
          p.timer -= dt;
          if (p.timer <= 0) {
            p.active = true;
            p.mesh.visible = true;
          }
        }
      });

      function checkPad(car) {
        pads.forEach(p => {
          if (!p.active) return;
          const d = Math.hypot(car.position.x - p.x, car.position.z - p.z);
          if (d < 1.8) {
            car.userData.boost = 100;
            p.active = false;
            p.timer = 6;
            p.mesh.visible = false;
            msgEl.textContent = car === player ? 'Boost pad collected!' : 'AI collected a boost pad!';
          }
        });
      }

      checkPad(player);
      checkPad(ai);
    }

    function updateBall(dt) {
      ball.position.addScaledVector(ballVel, dt);
      ballVel.multiplyScalar(0.992);
      ballVel.y -= 18 * dt;
      ball.position.y += ballVel.y * dt;

      const r = 1.2;
      if (ball.position.y < r) {
        ball.position.y = r;
        ballVel.y *= -0.68;
      }

      const bounce = 0.82;
      if (ball.position.x < -halfL + r) { ball.position.x = -halfL + r; ballVel.x *= -bounce; }
      if (ball.position.x >  halfL - r) { ball.position.x =  halfL - r; ballVel.x *= -bounce; }
      if (ball.position.z < -halfW + r) { ball.position.z = -halfW + r; ballVel.z *= -bounce; }
      if (ball.position.z >  halfW - r) { ball.position.z =  halfW - r; ballVel.z *= -bounce; }

      if (Math.abs(ball.position.y) < 1.8 && Math.abs(ball.position.z) < 4) {
        if (ball.position.x < -halfL + 1.5) scoreGoal(false);
        if (ball.position.x >  halfL - 1.5) scoreGoal(true);
      }
    }

    function chaseCamera() {
      const back = new THREE.Vector3(Math.sin(player.rotation.y), 0, Math.cos(player.rotation.y));
      const target = player.position.clone()
        .addScaledVector(back, -10)
        .add(new THREE.Vector3(0, 6.5, 0));
      camera.position.lerp(target, 0.08);
      camera.lookAt(player.position.x, 1.0, player.position.z);
    }

    function kickoffCountdown(dt) {
      countdownTimer += dt;
      if (countdown === 3 && countdownTimer >= 1) { countdown = 2; countdownEl.textContent = '2'; countdownTimer = 0; }
      else if (countdown === 2 && countdownTimer >= 1) { countdown = 1; countdownEl.textContent = '1'; countdownTimer = 0; }
      else if (countdown === 1 && countdownTimer >= 1) {
        countdown = 0;
        countdownEl.textContent = 'GO!';
        countdownTimer = 0;
        state = 'playing';
        kickoffLock = 0.35;
      }
    }

    function renderBoostText() {
      boostUI.innerHTML =
        `<span class="padLegend" style="background:#00ff88"></span>Boost Pads active<br>` +
        `Your boost: ${Math.floor(player.userData.boost)}%<br>` +
        `AI boost: ${Math.floor(ai.userData.boost)}%`;
    }

    const clock = new THREE.Clock();
    resetPositions();
    setScore();
    startCountdown('3');

    function animate() {
      requestAnimationFrame(animate);
      const dt = Math.min(clock.getDelta(), 0.033);

      if (state === 'countdown') {
        kickoffCountdown(dt);
      } else if (state === 'paused') {
        matchResetTimer -= dt;
        if (matchResetTimer <= 0) startCountdown('3');
      } else if (state === 'playing') {
        if (kickoffLock > 0) kickoffLock -= dt;
        else {
          playerInput(dt);
          aiInput(dt);
          carBall(player);
          carBall(ai);
          updateBoostPads(dt);
          updateBall(dt);
        }
      }

      chaseCamera();
      renderBoostText();
      renderer.render(scene, camera);
    }

    animate();

    addEventListener('resize', () => {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
    });
  </script>
</body>
</html>
